name: Mobile Release

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx expo lint

  android:
    needs: quality
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_REVENUECAT_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_KEY }}
      EXPO_PUBLIC_FACEBOOK_APP_ID: ${{ secrets.EXPO_PUBLIC_FACEBOOK_APP_ID }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_VERSION_CODE: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v5

      - name: Set short SHA
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Configure release signing
        run: bash scripts/configure-android-signing.sh

      - name: Set version code
        run: bash scripts/set-android-version-code.sh

      - name: Build release AAB
        run: ./gradlew bundleRelease --no-daemon
        working-directory: android

      - name: Stage release artifacts
        run: |
          cp android/app/build/outputs/bundle/release/app-release.aab looxmaxxing-${{ env.SHA_SHORT }}.aab
          cp android/app/build/outputs/mapping/release/mapping.txt mapping-${{ env.SHA_SHORT }}.txt

      - name: Upload Play Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: looxmaxxing-play-${{ env.SHA_SHORT }}
          path: |
            looxmaxxing-${{ env.SHA_SHORT }}.aab
            mapping-${{ env.SHA_SHORT }}.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "android-${{ github.run_number }}" \
            "looxmaxxing-${{ env.SHA_SHORT }}.aab" \
            "mapping-${{ env.SHA_SHORT }}.txt" \
            --title "Android build ${{ env.SHA_SHORT }} (v${{ env.ANDROID_VERSION_CODE }})" \
            --notes "Play Store bundle (versionCode ${{ env.ANDROID_VERSION_CODE }}) + ProGuard mapping. Upload .aab to Internal testing, attach mapping.txt as deobfuscation file, and add testers before rollout." \
            --latest

      - name: Submit to Play Store internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.balkanbit.looxmaxxing
          releaseFiles: looxmaxxing-${{ env.SHA_SHORT }}.aab
          track: internal
          mappingFile: mapping-${{ env.SHA_SHORT }}.txt

      - name: Prune old Android artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_ARTIFACTS: "2"
        run: bash scripts/prune-android-artifacts.sh

  ios:
    needs: quality
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    env:
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_REVENUECAT_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_KEY_IOS }}
      EXPO_PUBLIC_FACEBOOK_APP_ID: ${{ secrets.EXPO_PUBLIC_FACEBOOK_APP_ID }}
      IOS_BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v5

      - name: Set short SHA
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install CocoaPods
        run: pod install
        working-directory: ios

      - name: Set build number
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $IOS_BUILD_NUMBER" \
            ios/looxmaxxing/Info.plist

      - name: Set up signing keychain
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 20)
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
          security create-keychain -p "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/build.keychain
          security set-keychain-settings -lut 21600 $RUNNER_TEMP/build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/build.keychain
          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $RUNNER_TEMP/build.keychain
          security list-keychains -d user -s $RUNNER_TEMP/build.keychain
          security set-key-partition-list \
            -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" \
            $RUNNER_TEMP/build.keychain

      - name: Install provisioning profile
        env:
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode \
            -o $RUNNER_TEMP/profile.mobileprovision
          UUID=$(security cms -D -i $RUNNER_TEMP/profile.mobileprovision \
            | plutil -extract UUID raw -)
          echo "PP_UUID=$UUID" >> $GITHUB_ENV
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/looxmaxxing.xcworkspace \
            -scheme looxmaxxing \
            -configuration Release \
            -archivePath $RUNNER_TEMP/looxmaxxing.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PP_UUID"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.balkanbit.looxmaxxing</key>
              <string>$PP_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/looxmaxxing.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode \
            -o ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/looxmaxxing.ipa" \
            --apiKey "${{ secrets.APPLE_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPLE_API_KEY_ISSUER_ID }}"

      - name: Stage IPA
        run: cp $RUNNER_TEMP/ipa/looxmaxxing.ipa looxmaxxing-${{ env.SHA_SHORT }}.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: looxmaxxing-ios-${{ env.SHA_SHORT }}
          path: looxmaxxing-${{ env.SHA_SHORT }}.ipa

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "ios-${{ github.run_number }}" \
            "looxmaxxing-${{ env.SHA_SHORT }}.ipa" \
            --title "iOS build ${{ env.SHA_SHORT }} (b${{ env.IOS_BUILD_NUMBER }})" \
            --notes "TestFlight build ${{ env.IOS_BUILD_NUMBER }}. Submitted to TestFlight automatically." \
            --latest=false