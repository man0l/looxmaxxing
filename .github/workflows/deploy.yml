name: Mobile Release

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx expo lint

  android:
    needs: quality
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_REVENUECAT_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_KEY }}
      EXPO_PUBLIC_FACEBOOK_APP_ID: ${{ secrets.EXPO_PUBLIC_FACEBOOK_APP_ID }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_VERSION_CODE: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v5

      - name: Set short SHA
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Configure release signing
        run: bash scripts/configure-android-signing.sh

      - name: Set version code
        run: bash scripts/set-android-version-code.sh

      - name: Build release AAB
        run: ./gradlew bundleRelease --no-daemon
        working-directory: android

      - name: Stage release artifacts
        run: |
          cp android/app/build/outputs/bundle/release/app-release.aab looxmaxxing-${{ env.SHA_SHORT }}.aab
          cp android/app/build/outputs/mapping/release/mapping.txt mapping-${{ env.SHA_SHORT }}.txt

      - name: Upload Play Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: looxmaxxing-play-${{ env.SHA_SHORT }}
          path: |
            looxmaxxing-${{ env.SHA_SHORT }}.aab
            mapping-${{ env.SHA_SHORT }}.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "android-${{ github.run_number }}" \
            "looxmaxxing-${{ env.SHA_SHORT }}.aab" \
            "mapping-${{ env.SHA_SHORT }}.txt" \
            --title "Android build ${{ env.SHA_SHORT }} (v${{ env.ANDROID_VERSION_CODE }})" \
            --notes "Play Store bundle (versionCode ${{ env.ANDROID_VERSION_CODE }}) + ProGuard mapping. Upload .aab to Internal testing, attach mapping.txt as deobfuscation file, and add testers before rollout." \
            --latest

      - name: Submit to Play Store internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.balkanbit.looxmaxxing
          releaseFiles: looxmaxxing-${{ env.SHA_SHORT }}.aab
          track: internal
          mappingFile: mapping-${{ env.SHA_SHORT }}.txt

      - name: Prune old Android artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_ARTIFACTS: "2"
        run: bash scripts/prune-android-artifacts.sh

  ios:
    needs: quality
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_REVENUECAT_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_KEY_IOS }}
      EXPO_PUBLIC_FACEBOOK_APP_ID: ${{ secrets.EXPO_PUBLIC_FACEBOOK_APP_ID }}
    steps:
      - uses: actions/checkout@v5

      - name: Set short SHA
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build iOS on EAS cloud
        run: |
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --wait \
            --json \
            2>/dev/null | tee /tmp/eas-build.json
          echo "ARTIFACT_URL=$(jq -r '.artifacts.buildUrl' /tmp/eas-build.json)" \
            >> $GITHUB_ENV

      - name: Download IPA
        run: curl -L -o looxmaxxing-${{ env.SHA_SHORT }}.ipa "$ARTIFACT_URL"

      - name: Prepare ASC key for submission
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$APPLE_API_KEY_BASE64" | base64 -d > AuthKey.p8
          jq --arg keyId "$APPLE_API_KEY_ID" \
             --arg issuerId "$APPLE_API_KEY_ISSUER_ID" \
             --arg teamId "$APPLE_TEAM_ID" \
             '.submit.production.ios = {
               "ascApiKeyPath": "./AuthKey.p8",
               "ascApiKeyId": $keyId,
               "ascApiKeyIssuerId": $issuerId,
               "appleTeamId": $teamId
             }' eas.json > eas.json.tmp && mv eas.json.tmp eas.json

      - name: Submit to TestFlight
        run: |
          eas submit \
            --platform ios \
            --path looxmaxxing-${{ env.SHA_SHORT }}.ipa \
            --profile production \
            --non-interactive

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: looxmaxxing-ios-${{ env.SHA_SHORT }}
          path: looxmaxxing-${{ env.SHA_SHORT }}.ipa

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "ios-${{ github.run_number }}" \
            "looxmaxxing-${{ env.SHA_SHORT }}.ipa" \
            --title "iOS build ${{ env.SHA_SHORT }} (b${{ github.run_number }})" \
            --notes "TestFlight build ${{ github.run_number }}. Submitted to TestFlight automatically." \
            --latest=false