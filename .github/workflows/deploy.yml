name: Android Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx expo lint

  android:
    needs: quality
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_REVENUECAT_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_KEY }}
      EXPO_PUBLIC_FACEBOOK_APP_ID: ${{ secrets.EXPO_PUBLIC_FACEBOOK_APP_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Export JS bundle
        run: npx expo export --platform android --output-dir dist

      - name: Build debug APK with bundled JS
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk looxmaxxing-debug-${{ env.SHA_SHORT }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: looxmaxxing-apk
          path: looxmaxxing-debug-${{ env.SHA_SHORT }}.apk

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "android-debug-${{ github.run_number }}" \
            "looxmaxxing-debug-${{ env.SHA_SHORT }}.apk" \
            --title "Android debug build ${{ env.SHA_SHORT }}" \
            --notes "Standalone debug APK with bundled JS from ${{ env.SHA_SHORT }}. Download the .apk, install on your phone (enable install from unknown sources). No Metro bundler required." \
            --latest
