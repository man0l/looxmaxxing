name: iOS Signing Setup

concurrency:
  group: ios-signing-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      certificate:
        description: Which certificate to import
        required: true
        default: development
        type: choice
        options:
          - development
          - distribution

jobs:
  import-certificate:
    runs-on: macos-latest
    env:
      KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v5

      - name: Create temporary keychain
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain login.keychain

      - name: Import certificate into keychain
        env:
          CERT_P12_BASE64: ${{ inputs.certificate == 'distribution' && secrets.IOS_DIST_CERTIFICATE_P12 || secrets.IOS_DEV_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ inputs.certificate == 'distribution' && secrets.IOS_DIST_CERTIFICATE_PASSWORD || secrets.IOS_DEV_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12

      - name: Verify identity is available
        run: security find-identity -v -p codesigning build.keychain

      # Next steps to add when you're ready to actually build/export:
      #   - install a provisioning profile matching this certificate
      #     (mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles &&
      #      cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/)
      #   - npx expo prebuild --platform ios --no-install
      #   - xcodebuild -workspace ios/*.xcworkspace -scheme <scheme> \
      #       -configuration Release archive -archivePath build/App.xcarchive
      #   - xcodebuild -exportArchive -archivePath build/App.xcarchive \
      #       -exportPath build -exportOptionsPlist exportOptions.plist
      #   - upload to TestFlight/App Store Connect (needs an App Store Connect API key secret)

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain || true
