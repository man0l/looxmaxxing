name: iOS Signing Setup

concurrency:
  group: ios-signing-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      job:
        description: What to run
        required: true
        default: verify-signing
        type: choice
        options:
          - verify-signing
          - testflight-release
      certificate:
        description: "Certificate to verify (verify-signing job only)"
        required: false
        default: development
        type: choice
        options:
          - development
          - distribution

jobs:
  verify-signing:
    if: inputs.job == 'verify-signing'
    runs-on: macos-26
    env:
      KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v5

      - name: Create temporary keychain
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain login.keychain

      - name: Import certificate into keychain
        env:
          CERT_P12_BASE64: ${{ inputs.certificate == 'distribution' && secrets.IOS_DIST_CERTIFICATE_P12 || secrets.IOS_DEV_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ inputs.certificate == 'distribution' && secrets.IOS_DIST_CERTIFICATE_PASSWORD || secrets.IOS_DEV_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12

      - name: Verify identity is available
        run: security find-identity -v -p codesigning build.keychain

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain || true

  testflight-release:
    if: inputs.job == 'testflight-release'
    runs-on: macos-26
    env:
      KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_REVENUECAT_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_KEY }}
      EXPO_PUBLIC_REVENUECAT_IOS_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_IOS_KEY }}
      EXPO_PUBLIC_FACEBOOK_APP_ID: ${{ secrets.EXPO_PUBLIC_FACEBOOK_APP_ID }}
      IOS_BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Create temporary keychain
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain login.keychain

      - name: Import distribution certificate into keychain
        env:
          CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_DIST_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/distribution.mobileprovision

      - name: Set iOS build number
        run: bash scripts/set-ios-build-number.sh

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: pod install
        working-directory: ios

      - name: Write export options
        run: |
          cat > exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>UTVHQM5W5U</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.balkanbit.looxmaxxing</key>
              <string>LooxMaxxing App Store</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/looxmaxxing.xcworkspace \
            -scheme looxmaxxing \
            -configuration Release \
            -archivePath build/looxmaxxing.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=UTVHQM5W5U \
            PROVISIONING_PROFILE_SPECIFIER="LooxMaxxing App Store" \
            CODE_SIGN_IDENTITY="Apple Distribution"

      - name: Export .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath build/looxmaxxing.xcarchive \
            -exportPath build \
            -exportOptionsPlist exportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: looxmaxxing-ipa
          path: build/looxmaxxing.ipa

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file build/looxmaxxing.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain || true
